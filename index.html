<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character encoding and responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Notebooks - Login</title>
    
    <!-- Bootstrap CSS for responsive design and styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Internal CSS styling for the login page -->
    <style>
        /* Body styling with gradient background */
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 50%, #0a58ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            z-index: -1;
        }
        
        /* Floating orbs animation */
        body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1), transparent);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            animation: float 6s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes moveBackground {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(20px);
            }
        }
        
        /* Login container styling */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(13, 110, 253, 0.1);
            padding: 60px 45px;
            max-width: 430px;
            width: 100%;
            animation: slideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(13, 110, 253, 0.15);
            backdrop-filter: blur(10px);
            position: relative;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #0d6efd, #0b5ed7, #0a58ca);
            border-radius: 25px 25px 0 0;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Logo styling */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-section img {
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
            border-radius: 20px;
            padding: 15px;
            animation: rotateInBounce 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.5);
        }
        
        @keyframes rotateInBounce {
            from {
                opacity: 0;
                transform: rotate(-45deg) scale(0.3);
            }
            to {
                opacity: 1;
                transform: rotate(0) scale(1);
            }
        }
        
        /* Heading styling */
        .login-container h1 {
            color: #0d6efd;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        /* Form group styling */
        .form-group {
            margin-bottom: 22px;
            animation: fadeIn 0.8s ease-out;
            animation-fill-mode: both;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.15s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }
        .form-group:nth-child(3) { animation-delay: 0.35s; }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-25px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .form-group label {
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 10px;
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-control {
            border: 2px solid #e0e7ff;
            border-radius: 14px;
            padding: 15px 18px;
            font-size: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #f8faff 0%, #f0f4ff 100%);
            font-family: inherit;
            position: relative;
        }
        
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 5px rgba(13, 110, 253, 0.1), inset 0 2px 8px rgba(13, 110, 253, 0.05);
            background: white;
            outline: none;
            transform: translateY(-2px);
        }
        
        .form-control::placeholder {
            color: #b0b9d4;
        }
        
        /* Checkbox styling */
        .form-check {
            margin-bottom: 28px;
            margin-top: 22px;
            padding: 16px 18px;
            background: linear-gradient(135deg, #f8faff 0%, #f0f4ff 100%);
            border: 2px solid #e0e7ff;
            border-radius: 14px;
            transition: all 0.3s ease;
        }
        
        .form-check:hover {
            background: linear-gradient(135deg, #f0f4ff 0%, #e9eeff 100%);
            border-color: #d0deff;
        }
        
        .form-check-input {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #0d6efd;
            border: 2px solid #d0deff;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .form-check-input:checked {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            border-color: #0b5ed7;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }
        
        .form-check-label {
            font-size: 14px;
            color: #333;
            margin-left: 10px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
        }
        
        .form-check-label small {
            display: block;
            color: #7c8da3;
            font-size: 12px;
            margin-top: 4px;
            margin-left: 0;
            font-weight: 500;
        }
        
        /* Button styling */
        .btn-login {
            background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
            border: none;
            padding: 16px;
            font-weight: 800;
            font-size: 15px;
            width: 100%;
            border-radius: 14px;
            margin-bottom: 12px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(13, 110, 253, 0.35);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(13, 110, 253, 0.45);
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:active {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
        
        .btn-cancel {
            background: linear-gradient(135deg, #f0f4ff 0%, #e9eeff 100%);
            color: #0d6efd;
            border: 2px solid #d0deff;
            padding: 13px;
            font-weight: 800;
            font-size: 14px;
            width: 48%;
            border-radius: 14px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-cancel:hover {
            background: linear-gradient(135deg, #e9eeff 0%, #dfe7ff 100%);
            border-color: #b0c4ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.15);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 28px;
            justify-content: space-between;
        }
        
        /* Footer link styling */
        .footer-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 22px;
            border-top: 2px solid #e9eeff;
        }
        
        .footer-link a {
            color: #0d6efd;
            text-decoration: none;
            font-size: 13px;
            font-weight: 800;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            position: relative;
        }
        
        .footer-link a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #0d6efd, #0b5ed7);
            transition: width 0.3s ease;
        }
        
        .footer-link a:hover::after {
            width: 100%;
        }
        
        /* Alert styling */
        .error-message {
            display: none;
            color: #dc3545;
            font-size: 12px;
            margin-top: 7px;
            font-weight: 700;
            animation: shake 0.4s cubic-bezier(0.36, 0, 0.66, -0.56);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <!-- Main login container -->
    <div class="login-container">
        <!-- Logo section -->
        <div class="logo-section">
            <img src="https://via.placeholder.com/80/0d6efd/ffffff?text=📓" alt="Notebooks Logo">
            <h1>Login</h1>
            <p class="login-subtitle">Virtual Notebook System</p>
        </div>
        
        <!-- Login form with validation -->
        <form id="loginForm">
            <!-- Username input field -->
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="username" 
                    placeholder="Enter your username"
                    required
                >
                <span class="error-message" id="usernameError">Username is required</span>
            </div>
            
            <!-- Password input field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    placeholder="Enter your password"
                    required
                >
                <span class="error-message" id="passwordError">Password is required</span>
            </div>
            
            <!-- Stay logged in checkbox -->
            <div class="form-check">
                <input 
                    class="form-check-input" 
                    type="checkbox" 
                    id="stayLoggedIn"
                >
                <label class="form-check-label" for="stayLoggedIn">
                    Stay logged in<br>
                    <small>Your account will stay active on this device</small>
                </label>
            </div>
            
            <!-- Login and Cancel buttons -->
            <div class="button-group">
                <button type="submit" class="btn btn-login">Login</button>
                <button type="reset" class="btn btn-cancel">Cancel</button>
            </div>
            
            <!-- Footer links -->
            <div class="footer-link">
                <a href="#" onclick="handleForgotPassword()">Forgot username / password?</a>
            </div>
        </form>
    </div>
    
    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JavaScript functionality -->
    <script>
        // Variable to store user session status
        // Uses assignment operator to initialize session state
        let isLoggedIn = false;
        let username = "";
        
        // Array of valid credentials - using data structure for authentication
        // Comment: Array of objects containing authorized username and password combinations
        const validCredentials = [
            { username: "student", password: "password123" },
            { username: "teacher", password: "teacher123" },
            { username: "admin", password: "admin123" }
        ];
        
        // Get form elements
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const stayLoggedInCheckbox = document.getElementById('stayLoggedIn');
        
        // Load saved username if user previously selected "Stay logged in"
        // Using conditional statement to check localStorage
        if (localStorage.getItem('stayLoggedIn') === 'true') {
            usernameInput.value = localStorage.getItem('savedUsername') || '';
            stayLoggedInCheckbox.checked = true;
        }
        
        // Form submission handler - triggered on submit event
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Get input values
            const user = usernameInput.value.trim();
            const password = passwordInput.value;
            
            // Validate username is not empty using conditional statement
            if (user.length === 0) {
                showError('usernameError');
                return;
            }
            
            // Validate password is not empty using conditional statement
            if (password.length === 0) {
                showError('passwordError');
                return;
            }
            
            // Check if credentials match any valid credentials
            // Comment: Using iteration (find method) to search credentials array
            const validUser = validCredentials.find(cred => 
                cred.username === user && cred.password === password
            );
            
            // Using conditional statement to verify credentials
            if (validUser) {
                // Access Granted - credentials are valid
                displayAccessGranted(user);
            } else {
                // Access Denied - credentials are invalid
                displayAccessDenied();
            }
        });
        
        // Function to display error message
        // Comment: Helper function to show validation errors
        function showError(errorId) {
            const errorElement = document.getElementById(errorId);
            errorElement.style.display = 'block';
            
            // Hide error after 3 seconds
            setTimeout(() => {
                errorElement.style.display = 'none';
            }, 3000);
        }
        
        // Function to display access granted message
        // Comment: Shows access granted alert when valid credentials provided
        function displayAccessGranted(user) {
            // Using window.alert for success feedback
            const message = "✓ ACCESS GRANTED\n\nWelcome, " + user + "!\nYou have successfully logged in.";
            window.alert(message);
            
            // Store session data if "Stay logged in" is checked - using conditional
            if (stayLoggedInCheckbox.checked) {
                localStorage.setItem('stayLoggedIn', 'true');
                localStorage.setItem('savedUsername', user);
            } else {
                localStorage.removeItem('stayLoggedIn');
                localStorage.removeItem('savedUsername');
            }
            
            // Set logged in status
            isLoggedIn = true;
            username = user;
            
            // Redirect to notebooks page after successful login
            setTimeout(() => {
                window.location.href = 'notebooks.html';
            }, 500);
        }
        
        // Function to display access denied message
        // Comment: Shows access denied alert when invalid credentials provided
        function displayAccessDenied() {
            // Display error message using window.alert
            const message = "✗ ACCESS DENIED\n\nInvalid username or password.\nPlease try again.";
            window.alert(message);
            
            // Clear password field on failed login
            passwordInput.value = '';
            
            // Clear username if user wants to try again
            usernameInput.focus();
        }
        
        // Function to display login success
        // Comment: Shows success message using window.alert and redirects user
        function displayLoginSuccess() {
            const message = `Welcome, ${usernameInput.value}!\nRedirecting to your notebooks...`;
            window.alert(message);
            
            // Redirect to notebooks page after successful login
            // Using setTimeout for a delayed redirect
            setTimeout(() => {
                window.location.href = 'notebooks.html';
            }, 500);
        }
        
        // Function to handle forgot password link
        // Comment: Event handler for password recovery
        function handleForgotPassword() {
            const recoveryUsername = prompt('Enter your username to recover password:');
            
            // Using conditional statement to validate input
            if (recoveryUsername) {
                // Using iteration (find method) to locate user in credentials
                const user = validCredentials.find(cred => cred.username === recoveryUsername);
                
                // Conditional statement to check if user exists
                if (user) {
                    document.write('<h1>✓ Recovery Email Sent</h1>');
                    document.write('<p>A password recovery email has been sent to: <strong>' + recoveryUsername + '</strong></p>');
                    document.write('<p>Check your email for password recovery instructions.</p>');
                    document.write('<p><a href="index.html">← Back to Login</a></p>');
                } else {
                    window.alert('Username not found in our system!');
                }
            }
        }
        
        // Clear error messages when user starts typing - iteration example
        // Comment: Using loop to add event listeners to form inputs
        const formInputs = [usernameInput, passwordInput];
        formInputs.forEach(input => {
            input.addEventListener('input', function() {
                const errorId = this.id + 'Error';
                const errorElement = document.getElementById(errorId);
                if (errorElement) {
                    errorElement.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
